<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Prioridad de Selectores</title>

    <style>
        p {
            color: blue;
        }

        .rojo {
            color: green;
        }

        #texto {
            color: red;
        }
    </style>
</head>

<body>

    <p id="texto" class="rojo" style="color: orange;">
        Ejemplo de prioridad con estilo en línea
    </p>

</body>

</html>
