<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de estilo sin CSS</title>
</head>
<body>
    <h1 style="color: rgb(255, 0, 13); font-family: arial; font-size: 24px; border-bottom: 2px solid red; padding-bottom: 5px;">Ejemplo del atributo style (css en linea)
        
    </h1>
    <p style="color: #555; font-family: Verdana; font-size: 16px; text-align: justify; margin-left: 30px; margin-right: 30px;">Los estilos se aplican directamente dentro de una etiqueta 
        Html, mediante el atributo <b>style</b>. 
        Se usa para <i>ejemplos rápidos</i> o para <u>pruebas</u>, pero no se recomienda en el <b> diseño profesional</b>, ya que mezcla <b>Estructura</b> y <b>Presentación</b>. 
        
    </p>

</body>
</html>
